# Digital Lab School — Nginx Reverse Proxy Configuration
# ======================================================
# Universal: ganti server_name, ssl_certificate path, dan proxy_pass
# sesuai environment masing-masing sekolah.
#
# Let's Encrypt: gunakan certbot untuk generate certificate:
#   certbot certonly --nginx -d lab.sekolahkita.sch.id
#
# Path standar Let's Encrypt: /etc/letsencrypt/live/<domain>/

# ==============================================================================
# HTTP — Redirect ke HTTPS
# ==============================================================================
server {
    listen 80;
    server_name lab.smauiiyk.sch.id;  # ← GANTI dengan domain sekolah

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# HTTPS — Proxy ke Aplikasi
# ==============================================================================
server {
    listen 443 ssl http2;
    server_name lab.smauiiyk.sch.id;  # ← GANTI dengan domain sekolah

    # =========================================================================
    # SSL — Let's Encrypt (certbot)
    # =========================================================================
    ssl_certificate     /etc/letsencrypt/live/lab.smauiiyk.sch.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.smauiiyk.sch.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/lab.access.log;
    error_log  /var/log/nginx/lab.error.log warn;

    # =========================================================================
    # Proxy — Aplikasi Astro
    # =========================================================================
    location / {
        proxy_pass http://digital-lab-app:3000;  # ← GANTI dengan nama container
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
