name: Deploy to Awankinton

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan deploy ke production'
        required: true
        default: 'Release fitur baru'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/dev/project/smauii-dev-foundation
            git pull origin main
            git submodule update --init --recursive
            docker build -t smauii-lab:latest .
            cd /home/dev/web/instances/smauii/lab
            docker compose up -d
            docker image prune -f
            echo "Deploy selesai: $(date)"
            echo "Alasan: ${{ github.event.inputs.reason }}"
