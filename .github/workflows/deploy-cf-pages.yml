name: Deploy Web → Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan deploy ke Cloudflare Pages'
        required: true
        default: 'Release fitur baru'

concurrency:
  group: cf-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (SSG mode)
        run: DEPLOY_MODE=ssg bun run build
        env:
          # URL API publik — set di GitHub repo → Settings → Secrets → Actions
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=smauii-lab --commit-dirty=true
